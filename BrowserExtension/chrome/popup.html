<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Download Manager</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 12px;
        min-width: 280px;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #444;
      }
      label {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <button id="ping">Check native host</button>
    <button id="send">Send current tab URL</button>
    <label>
      <input id="takeover" type="checkbox" />
      Take over browser downloads (off by default)
    </label>
    <div id="status"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
